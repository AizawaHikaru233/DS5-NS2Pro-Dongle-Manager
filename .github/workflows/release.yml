name: Release manager

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 1.0.0
        required: true
        default: 1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: manager-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version
        shell: bash
        run: |
          node <<'EOF'
          const fs = require("fs");
          const version = "${{ steps.version.outputs.version }}";
          const pkgPath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);

          const cargoPath = "src-tauri/Cargo.toml";
          let cargo = fs.readFileSync(cargoPath, "utf8");
          cargo = cargo.replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);

          const tauriPath = "src-tauri/tauri.conf.json";
          const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          tauri.version = version;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, 2)}\n`);
          EOF

      - name: Build MSI
        run: pnpm tauri build --bundles msi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "DS5 NS2Pro Dongle Manager ${{ steps.version.outputs.version }}" \
            --notes "Windows manager for DS5_NS2Pro_Dongle." \
            --target "${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            || true

      - name: Upload MSI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" src-tauri/target/release/bundle/msi/*.msi \
            --repo "${{ github.repository }}" \
            --clobber
